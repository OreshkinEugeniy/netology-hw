global_defs {
    enable_script_security
}

vrrp_script chk_web {
    script "/usr/local/bin/script.sh"
    interval 3
    fall 2
    rise 2
    weight -20
}

vrrp_instance VI_1 {
    state MASTER
    interface enp0s1
    virtual_router_id 15
    priority 255
    advert_int 1

    track_script {
        chk_web
    }

    virtual_ipaddress {
        192.168.64.10/24
    }
}
